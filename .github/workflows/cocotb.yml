#
# Builds and runs the cocotb VERIF testbench under Verilator 5.044 for every
# supported FDI configuration (single-PHY 32B / 64B / 128B). Each variant
# runs as its own matrix entry on a separate runner so they execute in
# parallel and never share a filesystem.
#
# Fatal: any failing @cocotb.test red-fails the matrix entry. With
# fail-fast: false, one variant failing does not cancel the others.

name: Cocotb Verification

on:
  pull_request:
    paths-ignore:
      - 'DOC/**'
  push:
    branches: [main, design]
    paths-ignore:
      - 'DOC/**'

permissions:
  contents: read

env:
  # Force Node 24 for any third-party action still pinned to Node 20
  # (notably veryl-lang/setup-verilator@v1). GitHub-maintained actions
  # below are already on Node-24-capable majors.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cocotb:
    name: "Verilator + cocotb (${{ matrix.fdi_config }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fdi_config: [sp32b, sp64b, sp128b]
    steps:
      - uses: actions/checkout@v6

      - name: Install Verilator 5.044
        uses: veryl-lang/setup-verilator@v2
        with:
          # veryl-lang/verilator-package only ships up to v5.044 (newer
          # tags exist upstream but have no pre-built binary yet).
          version: "5.044"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: VERIF/requirements.txt

      - name: Install cocotb dependencies
        run: pip install -r VERIF/requirements.txt

      - name: Run cocotb testbench
        working-directory: VERIF
        run: |
          mkdir -p ../logs
          set -o pipefail
          make FDI_CONFIG=${{ matrix.fdi_config }} JOBS=$(nproc) 2>&1 \
            | tee ../logs/cocotb_${{ matrix.fdi_config }}.log

      - name: Upload cocotb log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cocotb-log-${{ matrix.fdi_config }}
          path: logs/cocotb_${{ matrix.fdi_config }}.log

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cocotb-results-xml-${{ matrix.fdi_config }}
          path: VERIF/results_verilator_${{ matrix.fdi_config }}.xml
